<title>英语单词分类记忆法 · 28天速记</title>
<style>
:root{
  --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
  --txt:#e8eaed; --muted:#9aa3b2; --en:#7cc4ff; --pos:#c08bff; --zh:#e8eaed;
  --accent:#4f9dff; --accent2:#2ecc8f; --known:#3a4250; --chip:#222733;
}
.light{
  --bg:#f4f6fa; --panel:#ffffff; --panel2:#f0f3f8; --line:#e0e5ee;
  --txt:#1b2330; --muted:#6b7480; --en:#1763c7; --pos:#7b3fe4; --zh:#1b2330;
  --accent:#2f7fe6; --accent2:#1aa572; --known:#cfd6e2; --chip:#eef1f6;
}
.light .w{border-color:#b0bcc8}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,sans-serif;
  -webkit-font-smoothing:antialiased;line-height:1.5}
header{position:sticky;top:0;z-index:20;background:var(--panel);
  border-bottom:1px solid var(--line);padding:10px 14px}
.htop{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.5px}
.sub{color:var(--muted);font-size:12px}
.spacer{flex:1}
.btn{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
  padding:6px 11px;border-radius:9px;cursor:pointer;font-size:13px;transition:.15s}
.btn:hover{border-color:var(--accent)}
.btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.search{flex:1;min-width:140px;background:var(--panel2);border:1px solid var(--line);
  color:var(--txt);padding:8px 12px;border-radius:10px;font-size:14px}
.search:focus{outline:none;border-color:var(--accent)}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:9px;align-items:center}
.days{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.day-chip{background:var(--chip);border:1px solid var(--line);color:var(--muted);
  padding:4px 9px;border-radius:20px;cursor:pointer;font-size:12px;white-space:nowrap}
.day-chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
header.collapsed .controls,header.collapsed .days{display:none}
.statline{font-size:13px;color:var(--muted);padding:0 0 0 2px;margin-top:0}
#collapseBtn{transition:transform .2s;font-size:26px;line-height:1;padding:2px 8px}
header.collapsed #collapseBtn{transform:rotate(-90deg)}
main{max-width:920px;margin:0 auto;padding:14px}
.daysec{margin-bottom:26px}
.day-h{font-size:17px;font-weight:700;color:var(--accent2);margin:14px 0 4px;
  position:sticky;top:0;padding:4px 0}
.grp{margin:14px 0 6px}
.grp-h{display:inline-block;font-size:15px;font-weight:600;background:var(--panel2);
  color:var(--txt);padding:3px 10px;border-radius:7px;border-left:3px solid var(--accent)}
.grp-cnt{color:var(--muted);font-size:11px;margin-left:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:6px;margin-top:6px}
.w{display:flex;align-items:baseline;gap:7px;background:var(--panel);
  border:1px solid var(--line);border-radius:9px;padding:8px 11px;cursor:pointer;transition:.12s}
.w:hover{border-color:var(--accent)}
.w .en{color:var(--en);font-weight:600;font-size:19px}
.w .pos{color:var(--pos);font-size:13px;font-style:italic}
.w .zh{color:var(--zh);font-size:17px;margin-left:auto;text-align:right;cursor:pointer}
.w .spk{flex:none;font-size:13px;opacity:.5;cursor:pointer;user-select:none;padding:8px 10px;margin:-8px -10px -8px 0;transition:.12s}
.w .spk:hover{opacity:1;transform:scale(1.2)}
.w .spk.playing{opacity:1;color:var(--accent)}
.w-word{display:flex;flex-direction:column;gap:2px}
.w .ipa{font-size:13px;color:var(--muted);letter-spacing:.3px;line-height:1.2}
.w.known{opacity:.4}
.w.known .en{text-decoration:line-through}
.hide-zh .w .zh{visibility:hidden}
.hide-en .w .en,.hide-en .w .pos,.hide-en .w .ipa{visibility:hidden}
.w .zh.reveal,.w .en.reveal,.w .pos.reveal,.w .ipa.reveal{visibility:visible!important}
.empty{color:var(--muted);text-align:center;padding:40px}
/* flashcard */
.fc-wrap{position:fixed;inset:0;background:rgba(8,10,14,.92);z-index:50;
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.fc-wrap.show{display:flex}
.card{width:min(440px,92vw);height:300px;background:var(--panel);border:1px solid var(--line);
  border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;cursor:pointer;padding:24px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.4)}
.card .fen{font-size:38px;font-weight:700;color:var(--en)}
.card .fpos{font-size:15px;color:var(--pos);font-style:italic}
.card .fzh{font-size:24px;color:var(--zh)}
.card .ftap{font-size:12px;color:var(--muted)}
.card .fgrp{font-size:12px;color:var(--muted);position:absolute;margin-top:-220px}
.fc-bar{display:flex;gap:10px;margin-top:20px;align-items:center;flex-wrap:wrap;justify-content:center}
.fc-counter{color:var(--muted);font-size:13px;min-width:80px;text-align:center}
.fc-close{position:absolute;top:18px;right:20px;font-size:26px;color:var(--muted);
  cursor:pointer;background:none;border:none}
.fc-title{position:absolute;top:20px;left:20px;color:var(--muted);font-size:13px}
@media(max-width:560px){
  .grid{grid-template-columns:1fr}
  .w{padding:11px 13px}
  .w .en{font-size:22px}
  .w .pos{font-size:15px}
  .w .zh{font-size:19px}
  .w .spk{font-size:16px}
  h1{font-size:16px}
}
</style>
</head>

  <div class="fc-bar">

// ---- 发音 (Web Speech API, 离线使用系统语音) ----
let enVoice=null, autoSpeak=true;
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  enVoice = vs.find(v=>/en[-_]US/i.test(v.lang)&&/(Samantha|Google US English|Microsoft|Aria|Jenny)/i.test(v.name))
        || vs.find(v=>/en[-_]US/i.test(v.lang)) || vs.find(v=>/^en/i.test(v.lang)) || null;
}
if('speechSynthesis' in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function speak(text,el){
  if(!('speechSynthesis' in window)){return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=.9; if(enVoice)u.voice=enVoice;
  if(el){u.onstart=()=>el.classList.add('playing');u.onend=u.onerror=()=>el.classList.remove('playing');}
  speechSynthesis.speak(u);
}

const ipaCache=(()=>{try{return JSON.parse(localStorage.getItem(LS_IPA)||'{}')}catch{return {};}})();
function saveIpaCache(){try{localStorage.setItem(LS_IPA,JSON.stringify(ipaCache));}catch{}}
async function fetchVisibleIpa(){
  const words=[...new Set([...document.querySelectorAll('.ipa[data-word]')].map(el=>el.dataset.word).filter(w=>ipaCache[w]===undefined))];
  for(const word of words){
    let fetched=false, wait=400;
    for(let t=0;t<4&&!fetched;t++){
      try{
        const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
        if(r.status===429||r.status>=500){await new Promise(res=>setTimeout(res,wait));wait=Math.min(wait*2,6000);continue;}
        if(r.ok){const data=await r.json();ipaCache[word]=(data?.[0]?.phonetics||[]).find(p=>p.text)?.text||data?.[0]?.phonetic||'';}
        else{ipaCache[word]='';}  // 404：字典里查不到，缓存空值
        fetched=true;
      }catch{await new Promise(res=>setTimeout(res,wait));wait=Math.min(wait*2,6000);}
    }
    if(fetched){
      document.querySelectorAll('.ipa[data-word]').forEach(el=>{if(el.dataset.word===word)el.textContent=ipaCache[word];});
      saveIpaCache();
    }
    await new Promise(res=>setTimeout(res,200));
  }
}
const id = w => w.day+'|'+w.group+'|'+w.en+'|'+w.zh;

// ---- 云同步 (Cloudflare Worker + KV) ----
const SYNC_URL='https://word-sync.chilamc-y.workers.dev';
const LS_CODE='wclass_synccode_v1';
let syncCode=localStorage.getItem(LS_CODE)||'';
let pushTimer=null;
function saveKnownLocal(){localStorage.setItem(LS_KNOWN,JSON.stringify([...known]));}
function setSyncUI(txt){const b=document.getElementById('syncBtn');if(!b)return;
  b.classList.toggle('on',!!syncCode);
  b.textContent = syncCode ? ('☁️ '+(txt||'已开启')) : '☁️ 云同步';}
function persistKnown(){saveKnownLocal();if(syncCode){clearTimeout(pushTimer);pushTimer=setTimeout(cloudPush,1200);}}
async function cloudPush(){if(!syncCode)return;setSyncUI('同步中…');
  try{const r=await fetch(SYNC_URL+'/?code='+encodeURIComponent(syncCode),{method:'PUT',
    headers:{'Content-Type':'application/json'},body:JSON.stringify({known:[...known]})});
    if(!r.ok)throw 0;setSyncUI('已同步 ✓');}catch(e){setSyncUI('同步失败');}}
async function cloudPull(){if(!syncCode)return false;setSyncUI('同步中…');
  try{const r=await fetch(SYNC_URL+'/?code='+encodeURIComponent(syncCode));const d=await r.json();
    (d.known||[]).forEach(x=>known.add(x));saveKnownLocal();render();setSyncUI('已同步 ✓');return true;}
  catch(e){setSyncUI('同步失败');return false;}}
async function enableSync(){
  const code=(prompt('输入同步码（在所有设备用同一个码即可互通进度，至少4位）：',syncCode||'')||'').trim();
  if(code===''){return;}
  if(code.length<4){alert('同步码至少4位');return;}
  syncCode=code;localStorage.setItem(LS_CODE,code);setSyncUI('同步中…');
  await cloudPull();      // 拉取云端并与本地合并
  await cloudPush();      // 把合并结果推回云端
}
const LS_DAY='wclass_day_v1';
let curDay=localStorage.getItem(LS_DAY)||'all', onlyUnknown=false;

// build day list
const days=[]; DATA.forEach(w=>{if(!days.includes(w.day))days.push(w.day)});
const daysEl=document.getElementById('days');
function dayChip(label,val){const b=document.createElement('div');b.className='day-chip'+(val==curDay?' active':'');b.textContent=label;b.onclick=()=>{curDay=val;localStorage.setItem(LS_DAY,val);render();[...daysEl.children].forEach(c=>c.classList.remove('active'));b.classList.add('active');window.scrollTo(0,0);};return b;}
daysEl.appendChild(dayChip('全部',  'all'));
days.forEach(d=>daysEl.appendChild(dayChip(d,d)));

const main=document.getElementById('main');
const q=document.getElementById('q');
function filtered(){
  const kw=q.value.trim().toLowerCase();
  return DATA.filter(w=>{
    if(curDay!=='all' && w.day!==curDay) return false;
    if(onlyUnknown && known.has(id(w))) return false;
    if(kw){return (w.en.toLowerCase().includes(kw)||w.zh.toLowerCase().includes(kw)||w.group.toLowerCase().includes(kw));}
    return true;
  });
}
function render(){
  const list=filtered();
  document.getElementById('stat').textContent=`共 ${DATA.length} 词 · 已掌握 ${known.size} · 当前 ${list.length}`;
  if(!list.length){main.innerHTML='<div class="empty">没有匹配的词条 🤔</div>';return;}
  // group by day then group
  const byDay={};
  list.forEach(w=>{(byDay[w.day]=byDay[w.day]||{});(byDay[w.day][w.group]=byDay[w.day][w.group]||[]).push(w);});
  let html='';
  for(const day of days){
    if(!byDay[day])continue;
    html+=`<div class="daysec"><div class="day-h">${day}</div>`;
    for(const g in byDay[day]){
      const arr=byDay[day][g];
      html+=`<div class="grp"><span class="grp-h">${g}<span class="grp-cnt">${arr.length}</span></span><div class="grid">`;
      arr.forEach(w=>{
        const k=known.has(id(w))?' known':'';
        html+=`<div class="w${k}" data-id="${encodeURIComponent(id(w))}">
          <span class="w-word"><span class="en">${w.en}</span><span class="ipa" data-word="${w.en.replace(/"/g,'&quot;')}">${ipaCache[w.en]||''}</span></span><span class="pos">${w.pos||''}</span><span class="zh">${w.zh}</span><span class="spk" data-en="${w.en.replace(/"/g,'&quot;')}">🔊</span></div>`;
      });
      html+=`</div></div>`;
    }
    html+=`</div>`;
  }
  main.innerHTML=html;
  fetchVisibleIpa();
}
main.addEventListener('click',e=>{
  const sp=e.target.closest('.spk');
  if(sp){speak(sp.dataset.en,sp);return;}
  const zh=e.target.closest('.zh');
  if(zh){
    const card=zh.closest('.w');
    if(document.body.classList.contains('hide-zh')||document.body.classList.contains('hide-en')){
      const hidden=card.querySelector('.zh:not(.reveal),.en:not(.reveal)');
      if(hidden){card.querySelectorAll('.zh,.en,.pos,.ipa').forEach(s=>s.classList.add('reveal'));return;}
    }
    const spk=card.querySelector('.spk');
    if(spk){speak(spk.dataset.en,spk);return;}
  }
  const el=e.target.closest('.w'); if(!el)return;
  // if in mask mode, first click reveals just this card
  if(document.body.classList.contains('hide-zh')||document.body.classList.contains('hide-en')){
    const hidden=el.querySelector('.zh:not(.reveal),.en:not(.reveal)');
    if(hidden){el.querySelectorAll('.zh,.en,.pos,.ipa').forEach(s=>s.classList.add('reveal'));return;}
  }
  const i=decodeURIComponent(el.dataset.id);
  if(known.has(i))known.delete(i);else known.add(i);
  el.classList.toggle('known');
  persistKnown();
  document.getElementById('stat').textContent=`共 ${DATA.length} 词 · 已掌握 ${known.size} · 当前 ${filtered().length}`;
});
q.addEventListener('input',render);

function tgl(btnId,cls,after){const b=document.getElementById(btnId);b.onclick=()=>{const on=document.body.classList.toggle(cls);b.classList.toggle('on',on);if(after)after(on);};}
tgl('zhBtn','hide-zh',()=>document.querySelectorAll('.reveal').forEach(s=>s.classList.remove('reveal')));
tgl('enBtn','hide-en',()=>document.querySelectorAll('.reveal').forEach(s=>s.classList.remove('reveal')));
document.getElementById('knownBtn').onclick=function(){onlyUnknown=!onlyUnknown;this.classList.toggle('on',onlyUnknown);render();};
document.getElementById('resetBtn').onclick=()=>{if(confirm('确定清空“已掌握”进度？（仅清空本设备）')){known.clear();localStorage.removeItem(LS_KNOWN);render();if(syncCode)cloudPush();}};
document.getElementById('syncBtn').onclick=enableSync;
setSyncUI();
if(syncCode){cloudPull();}  // 打开页面时自动从云端拉取并合并
document.getElementById('autoSpkBtn').onclick=function(){autoSpeak=!autoSpeak;this.classList.toggle('on',autoSpeak);if(!autoSpeak)speechSynthesis.cancel();};

// theme
function applyTheme(t){document.body.classList.toggle('light',t==='light');document.getElementById('themeBtn').textContent=t==='light'?'🌙 深色':'☀️ 浅色';}
let theme=localStorage.getItem(LS_THEME)||'dark';applyTheme(theme);
// 顶部菜单收起/展开
const LS_COLLAPSE='wclass_collapse_v1';
const headerEl=document.querySelector('header');
function applyCollapse(c){headerEl.classList.toggle('collapsed',c);}
applyCollapse(localStorage.getItem(LS_COLLAPSE)!=='0');
document.getElementById('collapseBtn').onclick=()=>{const c=!headerEl.classList.contains('collapsed');applyCollapse(c);localStorage.setItem(LS_COLLAPSE,c?'1':'0');};
document.getElementById('themeBtn').onclick=()=>{theme=theme==='light'?'dark':'light';localStorage.setItem(LS_THEME,theme);applyTheme(theme);};

// flashcards
let deck=[],fi=0,flipped=false,fcMode='en2zh';
const fc=document.getElementById('fc'),card=document.getElementById('card');
function openFC(){deck=filtered().slice();if(!deck.length){alert('当前没有可练习的词');return;}fi=0;flipped=false;fc.classList.add('show');document.getElementById('fcTitle').textContent=(curDay==='all'?'全部':curDay)+(onlyUnknown?' · 未掌握':'');drawCard();}
function drawCard(){
  const w=deck[fi];flipped=false;
  document.getElementById('fcCounter').textContent=`${fi+1} / ${deck.length}`;
  const front = fcMode==='en2zh' ? `<div class="fen">${w.en}</div><div class="fpos">${w.pos||''}</div>` : `<div class="fzh">${w.zh}</div>`;
  card.innerHTML=`<div class="fgrp">${w.day} · ${w.group}</div>${front}<div class="ftap">点击翻面</div>`;
  if(autoSpeak && fcMode==='en2zh') speak(w.en);
}
function flip(){const w=deck[fi];flipped=!flipped;
  if(flipped){const back= fcMode==='en2zh' ? `<div class="fzh">${w.zh}</div>` : `<div class="fen">${w.en}</div><div class="fpos">${w.pos||''}</div>`;
    card.innerHTML=`<div class="fgrp">${w.day} · ${w.group}</div>${back}<div class="ftap">点击翻面</div>`;
    if(autoSpeak && fcMode==='zh2en') speak(w.en);
  }else drawCard();
}
card.onclick=flip;
document.getElementById('fcBtn').onclick=openFC;
document.getElementById('fcClose').onclick=()=>{fc.classList.remove('show');render();};
document.getElementById('fcNext').onclick=()=>{fi=(fi+1)%deck.length;drawCard();};
document.getElementById('fcPrev').onclick=()=>{fi=(fi-1+deck.length)%deck.length;drawCard();};
document.getElementById('fcSpeak').onclick=()=>speak(deck[fi].en);
document.getElementById('fcShuffle').onclick=()=>{for(let i=deck.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[deck[i],deck[j]]=[deck[j],deck[i]];}fi=0;drawCard();};
document.getElementById('fcKnown').onclick=()=>{known.add(id(deck[fi]));persistKnown();if(fi<deck.length-1){fi++;drawCard();}else drawCard();};
document.getElementById('fcMode').onclick=function(){fcMode=fcMode==='en2zh'?'zh2en':'en2zh';this.textContent=fcMode==='en2zh'?'英→中':'中→英';drawCard();};
document.addEventListener('keydown',e=>{if(!fc.classList.contains('show'))return;
  if(e.key==='ArrowRight')document.getElementById('fcNext').click();
  else if(e.key==='ArrowLeft')document.getElementById('fcPrev').click();
  else if(e.key===' '){e.preventDefault();flip();}
  else if(e.key==='Escape')document.getElementById('fcClose').click();
  else if(e.key==='p'||e.key==='P')speak(deck[fi].en);});

render();
</script>
</body>
</html>
